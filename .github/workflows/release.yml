name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract this version's notes from CHANGELOG.md
        run: |
          awk -v tag="## ${GITHUB_REF_NAME} " '
            index($0, tag) == 1 {flag=1; next}
            /^## v/ {if (flag) exit}
            flag {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if ! [ -s RELEASE_NOTES.md ]; then
            echo "See CHANGELOG.md for details." > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: Build tarball and SHA256SUMS
        run: |
          TARBALL="pfsense-doh-proxy-${GITHUB_REF_NAME}.tar.gz"
          tar --owner=0 --group=0 \
              --transform "s,^,pfsense-doh-proxy-${GITHUB_REF_NAME}/," \
              -czf "$TARBALL" \
              install.sh uninstall.sh src README.md CHANGELOG.md LICENSE
          sha256sum "$TARBALL" > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARBALL="pfsense-doh-proxy-${GITHUB_REF_NAME}.tar.gz"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --draft=false \
              --title "$GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md
            gh release upload "$GITHUB_REF_NAME" "$TARBALL" SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md \
              --verify-tag \
              "$TARBALL" SHA256SUMS
          fi
