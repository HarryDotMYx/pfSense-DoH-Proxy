name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: input
    id: pfsense-version
    attributes:
      label: pfSense version
      placeholder: "CE 2.8.1"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - DoH (proxy daemon)
        - DoT (native Unbound)
        - Not configured yet
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: >
        Output of `tail -50 /var/log/doh-proxy.log`, the error shown in the
        GUI, or installer output. Remove anything private (your DNS server
        hostname is fine to redact).
      render: shell
  - type: textarea
    id: unbound
    attributes:
      label: Unbound state (optional but very helpful)
      description: "Output of: `pgrep -l unbound` and `grep -A8 forward-zone /var/unbound/unbound.conf`"
      render: shell
